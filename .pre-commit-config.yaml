---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: [--maxkb=100]
      - id: check-merge-conflict
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        args:
          [
            "-x",
            "-a",
            "-o",
            "all",
            "-e",
            "SC2292",
            "-e",
            "SC2310",
            "-e",
            "SC2311",
          ]
        files: \.sh$
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff-format
        name: ruff format
      - id: ruff
        name: ruff linter
      - id: ruff
        name: ruff security
        args: [--select, S, --ignore, S101, --exclude, tests]
  - repo: local
    hooks:
      - id: ty-check
        name: ty type checker
        entry: ty check .
        language: system
        pass_filenames: false
        files: \.py$
      - id: pytest
        name: pytest with coverage
        entry: bash -c 'PYTHONPATH=. pytest --cov=ipaclient --cov-report=term-missing --cov-report=html'
        language: system
        pass_filenames: false
        files: \.py$
        stages: [pre-push]
